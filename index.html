<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisão - Concurso Banco Central</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg-primary:#ffffff;--bg-secondary:#f0f4f8;--text-primary:#1a1a1a;--text-secondary:#546e7a;
            --border-color:#cfd8dc;--accent:#003d82;--accent-light:#0055b8;--accent-lighter:#4a90e2;
            --gray-primary:#5a6c7d;--gray-light:#90a4ae;--gray-lighter:#eceff1;--success:#2e7d32;
            --warning:#f57c00;--danger:#c62828;--shadow:rgba(0,61,130,0.1);--card-border:#b0bec5;
        }
        [data-theme="dark"]{
            --bg-primary:#0f1419;--bg-secondary:#1a1f26;--text-primary:#e1e8ed;--text-secondary:#8899a6;
            --border-color:#2f3640;--accent:#1565c0;--accent-light:#1976d2;--accent-lighter:#42a5f5;
            --gray-primary:#78909c;--gray-light:#546e7a;--gray-lighter:#263238;--success:#388e3c;
            --warning:#fb8c00;--danger:#d32f2f;--shadow:rgba(0,0,0,0.4);--card-border:#37474f;
        }
        body{
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            background:linear-gradient(135deg,var(--bg-secondary)0%,var(--gray-lighter)100%);
            color:var(--text-primary);transition:background .3s,color .3s;min-height:100vh;
        }
        .header{
            background:linear-gradient(135deg,var(--accent)0%,var(--accent-light)50%,var(--gray-primary)100%);
            padding:2rem 2rem;box-shadow:0 4px 20px var(--shadow);display:flex;justify-content:space-between;
            align-items:center;border-bottom:3px solid var(--gray-light);position:relative;
        }
        .header h1{font-size:1.6rem;color:#fff;font-weight:700;text-shadow:0 2px 4px rgba(0,0,0,.2);letter-spacing:.5px}
        .theme-toggle{background:transparent;color:#fff;border:none;padding:.5rem;cursor:pointer;font-size:1.5rem;
            transition:all .3s;position:absolute;left:50%;transform:translateX(-50%)}
        .theme-toggle:hover{transform:translateX(-50%) scale(1.2)}
        .notification-btn{background:rgba(255,255,255,.2);color:#fff;border:2px solid rgba(255,255,255,.3);
            padding:.5rem 1rem;cursor:pointer;font-size:1.3rem;transition:all .3s;position:relative}
        .notification-btn:hover{background:rgba(255,255,255,.3);border-color:rgba(255,255,255,.5)}
        .notification-badge{position:absolute;top:-8px;right:-8px;background:var(--danger);color:#fff;
            border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;
            font-size:.75rem;font-weight:700;border:2px solid #fff;animation:pulse 2s infinite}
        .flashcard-btn{background:transparent;color:#fff;border:none;padding:.5rem 1rem;cursor:pointer;
            font-size:1rem;transition:all .3s;font-weight:500}
        .flashcard-btn:hover{opacity:.8}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        .container{max-width:1200px;margin:2rem auto;padding:0 2rem}
        .add-section{background:var(--bg-primary);padding:2rem;margin-bottom:2rem;box-shadow:0 4px 16px var(--shadow);
            border:2px solid var(--accent);border-left:6px solid var(--accent)}
        .add-section h2{color:var(--accent);margin-bottom:1.5rem;font-weight:700;font-size:1.3rem;
            display:flex;align-items:center;gap:.5rem}
        .add-section h2::before{content:"📚";font-size:1.5rem}
        .form-group{margin-bottom:1rem}
        .form-group label{display:block;margin-bottom:.5rem;font-weight:600}
        .form-group input,.form-group textarea{width:100%;padding:.75rem;border:2px solid var(--border-color);
            background:var(--bg-secondary);color:var(--text-primary);font-size:1rem;
            transition:border-color .3s;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
        .form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}
        .form-group textarea{resize:vertical;min-height:80px}
        .btn{background:linear-gradient(135deg,var(--accent)0%,var(--accent-light)100%);color:#fff;border:none;
            padding:.875rem 2rem;cursor:pointer;font-size:1rem;font-weight:600;transition:all .3s;
            box-shadow:0 4px 12px rgba(0,61,130,.2)}
        .btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,61,130,.3)}
        .subjects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;
            max-height:75vh;overflow-y:auto;padding-right:12px;scroll-behavior:smooth}
        .subjects-grid::-webkit-scrollbar{width:8px}
        .subjects-grid::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px}
        .subject-card{background:var(--bg-primary);padding:1.75rem;box-shadow:0 4px 16px var(--shadow);
            border:2px solid var(--card-border);border-top:4px solid var(--accent);transition:all .3s}
        .subject-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px var(--shadow);
            border-top-color:var(--accent-lighter)}
        .subject-card h3{margin-bottom:.5rem;color:var(--accent);font-weight:700;font-size:1.25rem}
        .subject-content{font-size:1.1rem;color:var(--text-primary);margin-bottom:1.25rem;font-weight:700;
            padding-left:.5rem;border-left:3px solid var(--gray-light)}
        .review-item{display:flex;justify-content:space-between;align-items:center;padding:1rem;
            margin-bottom:.75rem;background:var(--gray-lighter);border-left:5px solid var(--gray-primary);
            transition:all .2s}
        .review-item:hover{background:var(--border-color);transform:translateX(4px)}
        .review-item.overdue{border-left-color:var(--danger)}
        .review-item.upcoming{border-left-color:var(--warning)}
        .review-item.done{border-left-color:var(--success);opacity:.6}
        .review-item.highlight-review{background:#fff3cd;border-left:6px solid #c62828;
            box-shadow:0 0 0 3px #ffc107;transform:scale(1.02);transition:all .4s}
        [data-theme="dark"] .review-item.highlight-review{background:#3e2723;border-left-color:#ef5350;
            box-shadow:0 0 0 3px #ffb300}
        .review-info{flex:1}
        .review-days{font-weight:700;color:var(--accent);font-size:1rem}
        .review-date{font-size:.85rem;color:var(--text-secondary)}
        .review-btn{background:linear-gradient(135deg,var(--success)0%,#43a047 100%);color:#fff;border:none;
            padding:.625rem 1.25rem;cursor:pointer;font-size:.95rem;font-weight:600;transition:all .3s;
            box-shadow:0 2px 8px rgba(46,125,50,.2)}
        .review-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 12px rgba(46,125,50,.3)}
        .review-btn:disabled{background:var(--gray-light);cursor:not-allowed;box-shadow:none}
        .delete-btn{background:linear-gradient(135deg,var(--danger)0%,#e53935 100%);color:#fff;border:none;
            padding:.5rem 1rem;cursor:pointer;font-size:1.2rem;margin-left:.5rem;transition:all .3s;
            box-shadow:0 2px 8px rgba(198,40,40,.2);font-weight:bold}
        .delete-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(198,40,40,.3)}
        .edit-btn{background:linear-gradient(135deg,var(--accent)0%,var(--accent-light)100%);color:#fff;border:none;
            padding:.5rem 1rem;cursor:pointer;font-size:1rem;margin-left:.5rem;transition:all .3s;
            box-shadow:0 2px 8px rgba(0,61,130,.2);font-weight:bold}
        .edit-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,61,130,.3)}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);
            z-index:1000;align-items:center;justify-content:center}
        .modal.active{display:flex}
        .modal-content{background:var(--bg-primary);padding:2.5rem;max-width:580px;width:92%;max-height:88vh;
            box-shadow:0 8px 32px var(--shadow);border:3px solid var(--danger);animation:modalSlideIn .3s ease-out;
            display:flex;flex-direction:column}
        @keyframes modalSlideIn{from{opacity:0;transform:translateY(-50px)}to{opacity:1;transform:translateY(0)}}
        .modal-content h2{color:var(--danger);margin-bottom:.5rem;font-size:1.75rem;font-weight:700}
        .overdue-list{flex:1;overflow-y:auto;margin:1rem 0;padding-right:10px;max-height:60vh;scroll-behavior:smooth}
        .overdue-list::-webkit-scrollbar{width:8px}
        .overdue-list::-webkit-scrollbar-thumb{background:var(--danger);border-radius:4px}
        .overdue-item{padding:1rem;background:var(--gray-lighter);border-left:5px solid var(--danger);
            margin-bottom:.75rem;transition:all .2s;cursor:pointer}
        .overdue-item:hover{background:var(--border-color);transform:translateX(4px)}
        .modal-close{background:linear-gradient(135deg,var(--accent)0%,var(--accent-light)100%);color:#fff;
            border:none;padding:1rem 2rem;cursor:pointer;width:100%;font-size:1.1rem;font-weight:600;
            transition:all .3s;box-shadow:0 4px 12px rgba(0,61,130,.2);margin-top:1rem}
        .modal-close:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,61,130,.3)}
        @keyframes highlight{0%{box-shadow:0 0 0 0 var(--accent)}50%{box-shadow:0 0 30px 10px var(--accent)}
            100%{box-shadow:0 4px 16px var(--shadow)}}
        .start-from-section{margin-top:1rem;padding:1rem;background:var(--gray-lighter);
            border-left:4px solid var(--accent)}
        .start-from-section label{display:block;margin-bottom:.5rem;font-weight:600;color:var(--accent)}
        .notes-section{margin-top:1rem;border-top:2px solid var(--border-color);padding-top:1rem}
        .notes-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;
            padding:.75rem;background:var(--gray-lighter);border:2px solid var(--border-color);
            transition:all .2s}
        .notes-toggle:hover{background:var(--border-color)}
        .notes-toggle span{font-weight:600;color:var(--accent)}
        .notes-content{display:none;margin-top:.5rem;padding:1rem;background:var(--bg-secondary);
            border:2px solid var(--border-color);color:var(--text-primary);white-space:pre-wrap;word-wrap:break-word}
        .notes-content.show{display:block}
        .notes-content textarea{width:100%;min-height:100px;padding:.75rem;border:2px solid var(--border-color);
            background:var(--bg-primary);color:var(--text-primary);font-size:.95rem;resize:vertical;
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
        .notes-content textarea:focus{outline:none;border-color:var(--accent)}
        .save-note-btn{margin-top:.5rem;background:linear-gradient(135deg,var(--accent)0%,var(--accent-light)100%);
            color:#fff;border:none;padding:.5rem 1rem;cursor:pointer;font-size:.9rem;font-weight:600;
            transition:all .3s}
        .save-note-btn:hover{transform:translateY(-2px)}
        .edit-modal-content{border:3px solid var(--accent)}
        .edit-modal-content h2{color:var(--accent)}
        .flashcard-page{display:none;position:fixed;top:0;left:0;width:100%;height:100vh;
            background:linear-gradient(135deg,var(--bg-secondary)0%,var(--gray-lighter)100%);
            z-index:2000;overflow-y:scroll}
        .flashcard-page.active{display:block}
        .flashcard-header{background:linear-gradient(135deg,var(--accent)0%,var(--accent-light)50%,var(--gray-primary)100%);
            padding:1.5rem 2rem;box-shadow:0 4px 20px var(--shadow);display:flex;justify-content:space-between;
            align-items:center;border-bottom:3px solid var(--gray-light)}
        .flashcard-header h1{font-size:1.6rem;color:#fff;font-weight:700;text-shadow:0 2px 4px rgba(0,0,0,.2)}
        .close-flashcard-btn{background:rgba(255,255,255,.2);color:#fff;border:2px solid rgba(255,255,255,.3);
            padding:.5rem 1rem;cursor:pointer;font-size:1rem;transition:all .3s;font-weight:500}
        .close-flashcard-btn:hover{background:rgba(255,255,255,.3)}
        .flashcard-container{max-width:1000px;margin:2rem auto;padding:0 2rem}
        .flashcard-form{background:var(--bg-primary);padding:2rem;margin-bottom:2rem;
            box-shadow:0 4px 16px var(--shadow);border:2px solid var(--accent);border-left:6px solid var(--accent)}
        .flashcard-form h2{color:var(--accent);margin-bottom:1.5rem;font-weight:700;font-size:1.3rem}
        .flashcard-study-area{background:var(--bg-primary);padding:2rem;box-shadow:0 4px 16px var(--shadow);
            border:2px solid var(--accent);text-align:center}
        .flashcard-display{min-height:300px;background:var(--bg-secondary);border:3px solid var(--accent);
            padding:2rem;margin-bottom:1.5rem;display:flex;flex-direction:column;justify-content:center;
            align-items:center;cursor:pointer;transition:all .3s}
        .flashcard-display:hover{transform:scale(1.02);box-shadow:0 8px 24px var(--shadow)}
        .flashcard-front{font-size:1.5rem;font-weight:700;color:var(--accent);margin-bottom:1rem}
        .flashcard-back{font-size:1.2rem;color:var(--text-primary);margin-bottom:1rem;display:none}
        .flashcard-explanation{font-size:1rem;color:var(--text-secondary);font-style:italic;display:none}
        .flashcard-back.show,.flashcard-explanation.show{display:block}
        .flashcard-controls{display:flex;gap:1rem;justify-content:center;margin-bottom:1rem}
        .reveal-btn{background:linear-gradient(135deg,var(--accent)0%,var(--accent-light)100%);color:#fff;
            border:none;padding:1rem 2rem;cursor:pointer;font-size:1.1rem;font-weight:600;transition:all .3s}
        .reveal-btn:hover{transform:translateY(-2px)}
        .flashcard-actions{display:none;gap:1rem;justify-content:center}
        .flashcard-actions.show{display:flex}
        .correct-btn,.incorrect-btn{padding:1rem 2rem;border:none;cursor:pointer;font-size:1.2rem;
            font-weight:700;transition:all .3s;color:#fff}
        .correct-btn{background:linear-gradient(135deg,var(--success)0%,#43a047 100%)}
        .incorrect-btn{background:linear-gradient(135deg,var(--danger)0%,#e53935 100%)}
        .correct-btn:hover,.incorrect-btn:hover{transform:translateY(-2px)}
        .flashcard-stats{display:flex;gap:2rem;justify-content:center;font-size:1.2rem;font-weight:600}
        .stat-correct{color:var(--success)}.stat-incorrect{color:var(--danger)}
        .flashcard-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
            gap:1rem;margin-top:2rem}
        .flashcard-item{background:var(--bg-primary);padding:1rem;border:2px solid var(--card-border);
            border-left:4px solid var(--accent);position:relative}
        .flashcard-item h4{color:var(--accent);margin-bottom:.5rem;font-size:1rem}
        .flashcard-item-delete{position:absolute;top:.5rem;right:.5rem;background:var(--danger);
            color:#fff;border:none;padding:.25rem .5rem;cursor:pointer;font-size:.9rem;font-weight:bold}
        @media (max-width:768px){
            .subjects-grid{grid-template-columns:1fr}
            .flashcard-list{grid-template-columns:1fr}
            .modal-content{width:95%;max-height:92vh}
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 Revisão - Concurso Banco Central</h1>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        <div style="display:flex;gap:1rem;align-items:center">
            <button class="flashcard-btn" onclick="openFlashcards()">🃏 Flashcards</button>
            <button class="notification-btn" onclick="toggleNotifications()">
                🔔
                <span class="notification-badge" id="notificationBadge" style="display:none"></span>
            </button>
        </div>
    </div>

    <div class="container">
        <div class="add-section">
            <h2>Adicionar Nova Matéria</h2>
            <div class="form-group">
                <label for="subjectName">Nome da Matéria:</label>
                <input type="text" id="subjectName" placeholder="Ex: Direito Administrativo">
            </div>
            <div class="form-group">
                <label for="subjectContent">Conteúdo da Matéria:</label>
                <input type="text" id="subjectContent" placeholder="Ex: Princípios da Administração Pública">
            </div>
            <div class="form-group">
                <label for="subjectNotes">Anotações (opcional):</label>
                <textarea id="subjectNotes" placeholder="Digite suas anotações aqui..."></textarea>
            </div>
            <div class="start-from-section">
                <label>Marque as revisões já realizadas:</label>
                <div style="display:flex;flex-direction:column;gap:.5rem;margin-top:.5rem">
                    <label style="display:flex;align-items:center;gap:.5rem;font-weight:normal;cursor:pointer">
                        <input type="checkbox" id="review1" value="0" onchange="updateCheckboxes(0)">
                        <span>Revisão 1 dia</span>
                    </label>
                    <label style="display:flex;align-items:center;gap:.5rem;font-weight:normal;cursor:pointer">
                        <input type="checkbox" id="review7" value="1" onchange="updateCheckboxes(1)">
                        <span>Revisão 7 dias</span>
                    </label>
                    <label style="display:flex;align-items:center;gap:.5rem;font-weight:normal;cursor:pointer">
                        <input type="checkbox" id="review30" value="2" onchange="updateCheckboxes(2)">
                        <span>Revisão 30 dias</span>
                    </label>
                    <label style="display:flex;align-items:center;gap:.5rem;font-weight:normal;cursor:pointer">
                        <input type="checkbox" id="review60" value="3" onchange="updateCheckboxes(3)">
                        <span>Revisão 60 dias</span>
                    </label>
                    <label style="display:flex;align-items:center;gap:.5rem;font-weight:normal;cursor:pointer">
                        <input type="checkbox" id="review90" value="4" onchange="updateCheckboxes(4)">
                        <span>Revisão 90 dias</span>
                    </label>
                </div>
            </div>
            <button class="btn" onclick="addSubject()" style="margin-top:1rem">Adicionar Matéria</button>
        </div>

        <div class="form-group" style="margin-bottom:1rem">
            <label for="searchInput">🔍 Pesquisar Matéria:</label>
            <input type="text" id="searchInput" placeholder="Digite o nome ou conteúdo da matéria..." onkeyup="filterSubjects()" style="width:100%">
        </div>
        <div class="subjects-grid" id="subjectsGrid"></div>
    </div>

    <div class="modal" id="overdueModal">
        <div class="modal-content">
            <h2>⚠️ Revisões Atrasadas!</h2>
            <p>Você tem revisões pendentes:</p>
            <div class="overdue-list" id="overdueList"></div>
            <button class="modal-close" onclick="closeModal()">Entendi</button>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content edit-modal-content">
            <h2>✏️ Editar Matéria</h2>
            <div class="form-group">
                <label for="editSubjectName">Nome da Matéria:</label>
                <input type="text" id="editSubjectName">
            </div>
            <div class="form-group">
                <label for="editSubjectContent">Conteúdo da Matéria:</label>
                <input type="text" id="editSubjectContent">
            </div>
            <button class="modal-close" onclick="saveEdit()">Salvar</button>
            <button class="modal-close" onclick="closeEditModal()" style="margin-top:.5rem;background:var(--gray-light)">Cancelar</button>
        </div>
    </div>

    <div class="flashcard-page" id="flashcardPage">
        <div class="flashcard-header">
            <h1>🃏 Flashcards - Estudo de Concursos</h1>
            <button class="theme-toggle" onclick="toggleTheme()" style="position:absolute;left:50%;transform:translateX(-50%)">🌓</button>
            <button class="close-flashcard-btn" onclick="closeFlashcards()">← Voltar</button>
        </div>

        <div class="flashcard-container">
            <div class="flashcard-form">
                <h2>➕ Criar Novo Flashcard</h2>
                <div class="form-group">
                    <label for="cardTheme">Tema:</label>
                    <input type="text" id="cardTheme" placeholder="Digite o tema dos cartões...">
                </div>
                <div class="form-group">
                    <label for="cardCount">Quantos cartões deseja criar?</label>
                    <input type="number" id="cardCount" min="1" value="1" placeholder="Ex: 5">
                </div>
                <button class="btn" onclick="startCreatingCards()">Começar</button>
            </div>

            <div class="flashcard-creation-area" id="flashcardCreationArea" style="display:none">
                <div class="flashcard-form">
                    <h2 id="creationTitle">Criando Cartões</h2>
                    <p id="creationProgress" style="color:var(--text-secondary);margin-bottom:1rem"></p>
                    <div class="form-group">
                        <label for="cardFront">Frente do Cartão:</label>
                        <textarea id="cardFront" placeholder="Digite a pergunta ou termo..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="cardBack">Verso do Cartão:</label>
                        <textarea id="cardBack" placeholder="Digite a resposta..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="cardExplanation">Explicação (opcional):</label>
                        <textarea id="cardExplanation" placeholder="Digite uma explicação detalhada..."></textarea>
                    </div>
                    <button class="btn" onclick="addFlashcard()">Adicionar Cartão</button>
                    <button class="btn" onclick="cancelCreation()" style="margin-left:.5rem;background:var(--gray-light)">Cancelar</button>
                </div>
            </div>

            <div class="flashcard-study-area">
                <h2 style="color:var(--accent);margin-bottom:1.5rem;font-size:1.5rem">📖 Área de Estudo</h2>
                
                <div class="form-group" style="max-width:400px;margin:0 auto 1.5rem">
                    <label for="themeSelect">Selecione o Tema:</label>
                    <select id="themeSelect" onchange="changeTheme()" style="width:100%;padding:.75rem;border:2px solid var(--border-color);background:var(--bg-secondary);color:var(--text-primary);font-size:1rem;cursor:pointer">
                        <option value="">Selecione um tema</option>
                    </select>
                </div>

                <div class="flashcard-stats">
                    <div class="stat-correct">✓ Acertos: <span id="correctCount">0</span></div>
                    <div class="stat-incorrect">✗ Erros: <span id="incorrectCount">0</span></div>
                </div>

                <div class="flashcard-display" id="flashcardDisplay" onclick="revealCard()">
                    <div class="flashcard-front" id="cardFrontDisplay">Selecione um tema para começar a estudar!</div>
                    <div class="flashcard-back" id="cardBackDisplay"></div>
                    <div class="flashcard-explanation" id="cardExplanationDisplay"></div>
                    <div style="margin-top:1rem;font-size:1.1rem;color:var(--text-primary);font-weight:700" id="cardThemeDisplay"></div>
                </div>

                <div class="flashcard-controls">
                    <button class="reveal-btn" id="revealBtn" onclick="revealCard()">👁️ Revelar</button>
                </div>

                <div class="flashcard-actions" id="flashcardActions">
                    <button class="correct-btn" onclick="markCorrect()">✓ Acertei</button>
                    <button class="incorrect-btn" onclick="markIncorrect()">✗ Errei</button>
                </div>

                <div class="flashcard-list" id="flashcardList"></div>
            </div>
        </div>
    </div>

    <script>
        const REVIEW_INTERVALS=[1,7,30,60,90];
        let subjects={},editingSubjectId=null,flashcards=[],currentCardIndex=0,correctCount=0,incorrectCount=0,
            cardRevealed=false,currentTheme='',creatingTheme='',cardsToCreate=0,cardsCreated=0,currentFilter='';

        function updateCheckboxes(index){
            const cbs=[document.getElementById('review1'),document.getElementById('review7'),
                document.getElementById('review30'),document.getElementById('review60'),document.getElementById('review90')];
            if(cbs[index].checked)for(let i=0;i<index;i++)cbs[i].checked=true;
            else for(let i=index+1;i<cbs.length;i++)cbs[i].checked=false;
        }

        function filterSubjects(){
            currentFilter=document.getElementById('searchInput').value.toLowerCase().trim();
            renderSubjects();
        }

        function init(){
            loadData();renderSubjects();updateNotificationBadge();checkOverdueReviews();
            loadTheme();loadFlashcards();loadFlashcardStats();
        }

        function loadData(){const s=localStorage.getItem('concursoReviews');if(s)subjects=JSON.parse(s)}
        function saveData(){localStorage.setItem('concursoReviews',JSON.stringify(subjects))}

        function addSubject(){
            const name=document.getElementById('subjectName').value.trim(),
                  content=document.getElementById('subjectContent').value.trim(),
                  notes=document.getElementById('subjectNotes').value.trim();
            
            const completedReviews=[];
            if(document.getElementById('review1').checked)completedReviews.push(0);
            if(document.getElementById('review7').checked)completedReviews.push(1);
            if(document.getElementById('review30').checked)completedReviews.push(2);
            if(document.getElementById('review60').checked)completedReviews.push(3);
            if(document.getElementById('review90').checked)completedReviews.push(4);
            
            if(!name||!content){alert('Por favor, preencha todos os campos obrigatórios');return}

            const id=Date.now().toString(),today=new Date().toISOString().split('T')[0];
            
            subjects[id]={
                name,content,notes:notes||'',
                reviews:REVIEW_INTERVALS.map((days,idx)=>({
                    days,nextDate:addDays(today,days),
                    completed:completedReviews.includes(idx),
                    completedDate:completedReviews.includes(idx)?today:null
                }))
            };

            document.getElementById('subjectName').value='';
            document.getElementById('subjectContent').value='';
            document.getElementById('subjectNotes').value='';
            ['review1','review7','review30','review60','review90'].forEach(id=>document.getElementById(id).checked=false);
            
            saveData();renderSubjects();
        }

        function addDays(dateStr,days){
            const d=new Date(dateStr);d.setDate(d.getDate()+days);return d.toISOString().split('T')[0];
        }

        function completeReview(subjectId,reviewIndex){
            const today=new Date().toISOString().split('T')[0],subject=subjects[subjectId];
            subject.reviews[reviewIndex].completed=true;
            subject.reviews[reviewIndex].completedDate=today;

            if(reviewIndex===subject.reviews.length-1){
                const newCycleDate=addDays(today,7);
                subject.reviews=REVIEW_INTERVALS.map((days,idx)=>({
                    days,nextDate:idx===1?newCycleDate:addDays(today,days),completed:false,completedDate:null
                }));
            }else if(reviewIndex<subject.reviews.length-1){
                subject.reviews[reviewIndex+1].nextDate=addDays(today,subject.reviews[reviewIndex+1].days);
            }

            saveData();renderSubjects();
        }

        function deleteSubject(id){delete subjects[id];saveData();renderSubjects()}
        
        function openEditModal(id){
            editingSubjectId=id;
            document.getElementById('editSubjectName').value=subjects[id].name;
            document.getElementById('editSubjectContent').value=subjects[id].content;
            document.getElementById('editModal').classList.add('active');
        }
        
        function closeEditModal(){editingSubjectId=null;document.getElementById('editModal').classList.remove('active')}
        
        function saveEdit(){
            if(!editingSubjectId)return;
            const name=document.getElementById('editSubjectName').value.trim(),
                  content=document.getElementById('editSubjectContent').value.trim();
            if(!name||!content){alert('Por favor, preencha todos os campos');return}
            subjects[editingSubjectId].name=name;
            subjects[editingSubjectId].content=content;
            saveData();renderSubjects();closeEditModal();
        }

        function toggleNotes(id){
            const nc=document.getElementById(`notes-${id}`),arrow=document.getElementById(`arrow-${id}`);
            if(nc.classList.contains('show')){nc.classList.remove('show');arrow.textContent='▶️'}
            else{nc.classList.add('show');arrow.textContent='🔽'}
        }

        function saveNote(id){
            subjects[id].notes=document.getElementById(`note-text-${id}`).value.trim();
            saveData();alert('Anotação salva com sucesso!');
        }

        function renderSubjects(){
            const grid=document.getElementById('subjectsGrid');grid.innerHTML='';
            const filtered=Object.entries(subjects).filter(([id,s])=>{
                if(!currentFilter)return true;
                return s.name.toLowerCase().includes(currentFilter)||s.content.toLowerCase().includes(currentFilter);
            });

            const frag=document.createDocumentFragment();
            
            filtered.forEach(([id,subject])=>{
                const card=document.createElement('div');card.className='subject-card';card.id=`subject-${id}`;
                
                let reviewsHTML=subject.reviews.map((review,idx)=>{
                    const isOverdue=new Date(review.nextDate)<new Date()&&!review.completed;
                    const isPending=!review.completed&&(idx===0||subject.reviews[idx-1].completed);
                    const daysUntil=Math.ceil((new Date(review.nextDate)-new Date())/(86400000));
                    
                    const statusClass=review.completed?'done':(isOverdue?'overdue':'upcoming');
                    const statusText=review.completed?`✓ Concluída em ${formatDate(review.completedDate)}`:
                        (isOverdue?`⚠️ Atrasada ${Math.abs(daysUntil)} dias`:`📅 Em ${daysUntil} dias`);

                    return `<div class="review-item ${statusClass}">
                        <div class="review-info">
                            <div class="review-days">Revisão ${review.days} dias</div>
                            <div class="review-date">${statusText} - ${formatDate(review.nextDate)}</div>
                        </div>
                        <button class="review-btn" onclick="completeReview('${id}',${idx})" ${!isPending||review.completed?'disabled':''}>
                            ${review.completed?'✓':'Revisar'}
                        </button>
                    </div>`;
                }).join('');

                const notesSection=`<div class="notes-section">
                    <div class="notes-toggle" onclick="toggleNotes('${id}')">
                        <span>Anotações</span><span id="arrow-${id}">▶️</span>
                    </div>
                    <div class="notes-content" id="notes-${id}">
                        <textarea id="note-text-${id}">${subject.notes||''}</textarea>
                        <button class="save-note-btn" onclick="saveNote('${id}')">Salvar Anotação</button>
                    </div>
                </div>`;

                card.innerHTML=`
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
                        <div>
                            <h3>${subject.name}</h3>
                            <div class="subject-content">${subject.content}</div>
                        </div>
                        <div>
                            <button class="edit-btn" onclick="openEditModal('${id}')">✏️</button>
                            <button class="delete-btn" onclick="deleteSubject('${id}')">✕</button>
                        </div>
                    </div>
                    ${reviewsHTML}
                    ${notesSection}
                `;
                frag.appendChild(card);
            });
            
            grid.appendChild(frag);
            updateNotificationBadge();
        }

        function formatDate(d){return new Date(d).toLocaleDateString('pt-BR')}

        function checkOverdueReviews(){
            const overdue=[],today=new Date();today.setHours(0,0,0,0);
            Object.entries(subjects).forEach(([id,s])=>{
                s.reviews.forEach((r,idx)=>{
                    const pending=!r.completed&&(idx===0||s.reviews[idx-1].completed);
                    const rd=new Date(r.nextDate);rd.setHours(0,0,0,0);
                    if(pending&&rd<=today){
                        overdue.push({subjectId:id,subject:s.name,content:s.content,days:r.days,
                            daysOverdue:Math.ceil((today-rd)/86400000),reviewIndex:idx});
                    }
                });
            });
            if(overdue.length)showOverdueModal(overdue);
        }

        function showOverdueModal(list){
            const modal=document.getElementById('overdueModal'),ol=document.getElementById('overdueList');
            ol.innerHTML=list.map(item=>`
                <div class="overdue-item" onclick="scrollAndHighlightReview('${item.subjectId}',${item.reviewIndex})">
                    <strong>${item.subject}</strong><br>
                    <span style="font-size:.9rem;color:var(--text-secondary)">${item.content}</span><br>
                    <span style="margin-top:.5rem;display:inline-block">Revisão ${item.days} dias</span><br>
                    <span style="color:var(--danger);font-weight:600">${item.daysOverdue===0?'Para revisar hoje!':`Atrasada há ${item.daysOverdue} dias`}</span>
                </div>
            `).join('');
            modal.classList.add('active');
        }

        function scrollAndHighlightReview(sid,ridx){
            closeModal();
            const el=document.getElementById(`subject-${sid}`);
            if(!el)return;
            el.scrollIntoView({behavior:'smooth',block:'center'});
            el.style.animation='highlight 1.5s ease-out';
            setTimeout(()=>el.style.animation='',1500);

            const nc=document.getElementById(`notes-${sid}`);
            if(nc&&!nc.classList.contains('show'))toggleNotes(sid);

            const items=el.querySelectorAll('.review-item');
            if(items[ridx]){
                items[ridx].classList.add('highlight-review');
                setTimeout(()=>items[ridx].classList.remove('highlight-review'),4000);
            }
        }

        function closeModal(){document.getElementById('overdueModal').classList.remove('active')}

        function toggleTheme(){
            const ct=document.documentElement.getAttribute('data-theme');
            const nt=ct==='dark'?'light':'dark';
            document.documentElement.setAttribute('data-theme',nt);
            localStorage.setItem('theme',nt);
        }

        function loadTheme(){
            const t=localStorage.getItem('theme')||'light';
            document.documentElement.setAttribute('data-theme',t);
        }

        function updateNotificationBadge(){
            const today=new Date();today.setHours(0,0,0,0);let count=0;
            Object.entries(subjects).forEach(([id,s])=>{
                s.reviews.forEach((r,idx)=>{
                    const pending=!r.completed&&(idx===0||s.reviews[idx-1].completed);
                    const rd=new Date(r.nextDate);rd.setHours(0,0,0,0);
                    if(pending&&rd<=today)count++;
                });
            });
            const badge=document.getElementById('notificationBadge');
            if(count>0){badge.textContent=count;badge.style.display='flex'}
            else badge.style.display='none';
        }

        function toggleNotifications(){
            const overdue=[],today=new Date();today.setHours(0,0,0,0);
            Object.entries(subjects).forEach(([id,s])=>{
                s.reviews.forEach((r,idx)=>{
                    const pending=!r.completed&&(idx===0||s.reviews[idx-1].completed);
                    const rd=new Date(r.nextDate);rd.setHours(0,0,0,0);
                    if(pending&&rd<=today){
                        overdue.push({subjectId:id,subject:s.name,content:s.content,days:r.days,
                            daysOverdue:Math.ceil((today-rd)/86400000),reviewIndex:idx});
                    }
                });
            });
            overdue.length?showOverdueModal(overdue):alert('🎉 Nenhuma revisão atrasada! Você está em dia!');
        }

        // Flashcards
        function openFlashcards(){
            document.getElementById('flashcardPage').classList.add('active');
            updateThemeSelector();renderFlashcardList();displayCurrentCard();
        }
        function closeFlashcards(){document.getElementById('flashcardPage').classList.remove('active')}

        function startCreatingCards(){
            const theme=document.getElementById('cardTheme').value.trim();
            const count=parseInt(document.getElementById('cardCount').value);
            if(!theme){alert('Por favor, digite o tema dos cartões');return}
            if(!count||count<1){alert('Por favor, digite uma quantidade válida');return}
            creatingTheme=theme;cardsToCreate=count;cardsCreated=0;
            document.querySelector('.flashcard-form').style.display='none';
            document.getElementById('flashcardCreationArea').style.display='block';
            updateCreationProgress();
        }

        function cancelCreation(){
            creatingTheme='';cardsToCreate=0;cardsCreated=0;
            document.querySelector('.flashcard-form').style.display='block';
            document.getElementById('flashcardCreationArea').style.display='none';
            document.getElementById('cardTheme').value='';
            document.getElementById('cardCount').value='1';
        }

        function updateCreationProgress(){
            document.getElementById('creationTitle').textContent=`Criando Cartões - Tema: ${creatingTheme}`;
            document.getElementById('creationProgress').textContent=`Cartão ${cardsCreated+1} de ${cardsToCreate}`;
        }

        function loadFlashcards(){const s=localStorage.getItem('flashcards');if(s)flashcards=JSON.parse(s)}
        function saveFlashcards(){localStorage.setItem('flashcards',JSON.stringify(flashcards))}

        function loadFlashcardStats(){
            const sc=localStorage.getItem('flashcardCorrect'),si=localStorage.getItem('flashcardIncorrect');
            if(sc)correctCount=parseInt(sc);if(si)incorrectCount=parseInt(si);
            updateStatsDisplay();
        }
        function saveFlashcardStats(){
            localStorage.setItem('flashcardCorrect',correctCount.toString());
            localStorage.setItem('flashcardIncorrect',incorrectCount.toString());
        }

        function addFlashcard(){
            const front=document.getElementById('cardFront').value.trim(),
                  back=document.getElementById('cardBack').value.trim(),
                  expl=document.getElementById('cardExplanation').value.trim();
            if(!front||!back){alert('Por favor, preencha a frente e o verso do cartão');return}

            flashcards.push({id:Date.now().toString(),theme:creatingTheme,front,back,explanation:expl});
            cardsCreated++;
            document.getElementById('cardFront').value='';
            document.getElementById('cardBack').value='';
            document.getElementById('cardExplanation').value='';

            saveFlashcards();
            if(cardsCreated>=cardsToCreate){
                alert(`Todos os ${cardsToCreate} cartões do tema "${creatingTheme}" foram criados!`);
                cancelCreation();updateThemeSelector();renderFlashcardList();
            }else updateCreationProgress();
        }

        function deleteFlashcard(id){
            const card=flashcards.find(c=>c.id===id);
            if(card&&card.theme===currentTheme){
                const tc=flashcards.filter(c=>c.theme===currentTheme);
                if(currentCardIndex>=tc.length-1)currentCardIndex=0;
            }
            flashcards=flashcards.filter(c=>c.id!==id);
            saveFlashcards();updateThemeSelector();renderFlashcardList();displayCurrentCard();
        }

        function updateThemeSelector(){
            const sel=document.getElementById('themeSelect');
            const themes=[...new Set(flashcards.map(c=>c.theme))];
            sel.innerHTML='<option value="">Selecione um tema</option>';
            themes.forEach(t=>{
                const opt=document.createElement('option');
                opt.value=t;opt.textContent=t;
                if(t===currentTheme)opt.selected=true;
                sel.appendChild(opt);
            });
        }

        function changeTheme(){
            currentTheme=document.getElementById('themeSelect').value;
            currentCardIndex=0;correctCount=0;incorrectCount=0;
            saveFlashcardStats();updateStatsDisplay();displayCurrentCard();
        }

        function getCurrentThemeCards(){return currentTheme?flashcards.filter(c=>c.theme===currentTheme):[]}

        function renderFlashcardList(){
            const list=document.getElementById('flashcardList');list.innerHTML='';
            if(!flashcards.length)return;
            const themes=[...new Set(flashcards.map(c=>c.theme))];
            themes.forEach(theme=>{
                const sec=document.createElement('div');
                sec.style.gridColumn='1/-1';sec.style.marginTop='1.5rem';
                const h=document.createElement('h3');
                h.textContent=`📚 ${theme}`;h.style.color='var(--accent)';h.style.marginBottom='1rem';
                h.style.fontSize='1.2rem';h.style.borderBottom='2px solid var(--accent)';h.style.paddingBottom='.5rem';
                sec.appendChild(h);list.appendChild(sec);

                const tcards=flashcards.filter(c=>c.theme===theme);
                tcards.forEach((card,i)=>{
                    const item=document.createElement('div');item.className='flashcard-item';
                    item.innerHTML=`<button class="flashcard-item-delete" onclick="deleteFlashcard('${card.id}')">✕</button>
                        <h4>Cartão ${i+1}</h4>
                        <p style="color:var(--text-secondary);font-size:.9rem">${card.front.substring(0,50)}${card.front.length>50?'...':''}</p>`;
                    list.appendChild(item);
                });
            });
        }

        function displayCurrentCard(){
            const f=document.getElementById('cardFrontDisplay'),
                  b=document.getElementById('cardBackDisplay'),
                  e=document.getElementById('cardExplanationDisplay'),
                  t=document.getElementById('cardThemeDisplay'),
                  ac=document.getElementById('flashcardActions'),
                  rb=document.getElementById('revealBtn');

            cardRevealed=false;
            b.classList.remove('show');e.classList.remove('show');
            ac.classList.remove('show');rb.style.display='block';

            const cards=getCurrentThemeCards();
            if(!cards.length){
                f.textContent=currentTheme?`Nenhum cartão encontrado para o tema "${currentTheme}"`:'Selecione um tema para começar a estudar!';
                b.textContent='';e.textContent='';t.textContent='';return;
            }
            const card=cards[currentCardIndex];
            f.textContent=card.front;b.textContent=card.back;
            e.textContent=card.explanation||'';t.textContent=`📚 Tema: ${card.theme}`;
        }

        function revealCard(){
            const cards=getCurrentThemeCards();
            if(!cards.length||cardRevealed)return;
            document.getElementById('cardBackDisplay').classList.add('show');
            const expl=document.getElementById('cardExplanationDisplay');
            if(expl.textContent)expl.classList.add('show');
            document.getElementById('flashcardActions').classList.add('show');
            document.getElementById('revealBtn').style.display='none';
            cardRevealed=true;
        }

        function markCorrect(){correctCount++;updateStatsDisplay();saveFlashcardStats();nextCard()}
        function markIncorrect(){incorrectCount++;updateStatsDisplay();saveFlashcardStats();nextCard()}

        function nextCard(){
            const cards=getCurrentThemeCards();
            if(!cards.length)return;
            currentCardIndex=(currentCardIndex+1)%cards.length;
            displayCurrentCard();
        }

        function updateStatsDisplay(){
            document.getElementById('correctCount').textContent=correctCount;
            document.getElementById('incorrectCount').textContent=incorrectCount;
        }

        init();
    </script>
</body>
</html>
