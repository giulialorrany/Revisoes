<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisão - Concurso Banco Central</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f0f4f8;
            --text-primary: #1a1a1a;
            --text-secondary: #546e7a;
            --border-color: #cfd8dc;
            --accent: #003d82;
            --accent-light: #0055b8;
            --accent-lighter: #4a90e2;
            --gray-primary: #5a6c7d;
            --gray-light: #90a4ae;
            --gray-lighter: #eceff1;
            --success: #2e7d32;
            --warning: #f57c00;
            --danger: #c62828;
            --shadow: rgba(0, 61, 130, 0.1);
            --card-border: #b0bec5;
        }

        [data-theme="dark"] {
            --bg-primary: #0f1419;
            --bg-secondary: #1a1f26;
            --text-primary: #e1e8ed;
            --text-secondary: #8899a6;
            --border-color: #2f3640;
            --accent: #1565c0;
            --accent-light: #1976d2;
            --accent-lighter: #42a5f5;
            --gray-primary: #78909c;
            --gray-light: #546e7a;
            --gray-lighter: #263238;
            --success: #388e3c;
            --warning: #fb8c00;
            --danger: #d32f2f;
            --shadow: rgba(0, 0, 0, 0.4);
            --card-border: #37474f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--gray-lighter) 100%);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 50%, var(--gray-primary) 100%);
            padding: 2rem 2rem;
            box-shadow: 0 4px 20px var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gray-light);
            position: relative;
        }

        .header h1 {
            font-size: 1.6rem;
            color: white;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            letter-spacing: 0.5px;
        }

        .theme-toggle {
            background: transparent;
            color: white;
            border: none;
            padding: 0.5rem;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .theme-toggle:hover {
            transform: translateX(-50%) scale(1.2);
        }

        .notification-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.3s;
            position: relative;
        }

        .notification-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            border: 2px solid white;
            animation: pulse 2s infinite;
        }

        .flashcard-btn {
            background: transparent;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            font-weight: 500;
        }

        .flashcard-btn:hover {
            opacity: 0.8;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .add-section {
            background: var(--bg-primary);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 16px var(--shadow);
            border: 2px solid var(--accent);
            border-left: 6px solid var(--accent);
        }

        .add-section h2 {
            color: var(--accent);
            margin-bottom: 1.5rem;
            font-weight: 700;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .add-section h2::before {
            content: "📚";
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(0, 61, 130, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 61, 130, 0.3);
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            max-height: 75vh;
            overflow-y: auto;
            padding-right: 12px;
            scroll-behavior: smooth;
        }

        .subjects-grid::-webkit-scrollbar {
            width: 8px;
        }

        .subjects-grid::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .subject-card {
            background: var(--bg-primary);
            padding: 1.75rem;
            box-shadow: 0 4px 16px var(--shadow);
            border: 2px solid var(--card-border);
            border-top: 4px solid var(--accent);
            transition: all 0.3s;
        }

        .subject-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--shadow);
            border-top-color: var(--accent-lighter);
        }

        .subject-card h3 {
            margin-bottom: 0.5rem;
            color: var(--accent);
            font-weight: 700;
            font-size: 1.25rem;
        }

        .subject-content {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 1.25rem;
            font-weight: 700;
            font-style: normal;
            padding-left: 0.5rem;
            border-left: 3px solid var(--gray-light);
        }

        .review-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            margin-bottom: 0.75rem;
            background: var(--gray-lighter);
            border-left: 5px solid var(--gray-primary);
            transition: all 0.2s;
        }

        .review-item:hover {
            background: var(--border-color);
            transform: translateX(4px);
        }

        .review-item.overdue {
            border-left-color: var(--danger);
        }

        .review-item.upcoming {
            border-left-color: var(--warning);
        }

        .review-item.done {
            border-left-color: var(--success);
            opacity: 0.6;
        }

        .review-item.highlight-review {
            background: #fff3cd;
            border-left: 6px solid #c62828;
            box-shadow: 0 0 0 3px #ffc107;
            transform: scale(1.02);
            transition: all 0.4s;
        }

        [data-theme="dark"] .review-item.highlight-review {
            background: #3e2723;
            border-left-color: #ef5350;
            box-shadow: 0 0 0 3px #ffb300;
        }

        .review-info {
            flex: 1;
        }

        .review-days {
            font-weight: 700;
            color: var(--accent);
            font-size: 1rem;
        }

        .review-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .review-btn {
            background: linear-gradient(135deg, var(--success) 0%, #43a047 100%);
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(46, 125, 50, 0.2);
        }

        .review-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }

        .review-btn:disabled {
            background: var(--gray-light);
            cursor: not-allowed;
            box-shadow: none;
        }

        .delete-btn {
            background: linear-gradient(135deg, var(--danger) 0%, #e53935 100%);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: 0.5rem;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(198, 40, 40, 0.2);
            font-weight: bold;
        }

        .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(198, 40, 40, 0.3);
        }

        .edit-btn {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1rem;
            margin-left: 0.5rem;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 61, 130, 0.2);
            font-weight: bold;
        }

        .edit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 61, 130, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            padding: 2.5rem;
            max-width: 580px;
            width: 92%;
            max-height: 85vh;
            box-shadow: 0 8px 32px var(--shadow);
            border: 3px solid var(--danger);
            animation: modalSlideIn 0.3s ease-out;
            display: flex;
            flex-direction: column;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            margin-bottom: 1rem;
        }

        .overdue-list {
            flex: 1;
            overflow-y: auto;
            margin: 1rem 0;
            padding-right: 8px;
            max-height: 55vh;
            scroll-behavior: smooth;
        }

        .overdue-list::-webkit-scrollbar {
            width: 8px;
        }

        .overdue-list::-webkit-scrollbar-thumb {
            background: var(--danger);
            border-radius: 4px;
        }

        .overdue-item {
            padding: 1rem;
            background: var(--gray-lighter);
            border-left: 5px solid var(--danger);
            margin-bottom: 0.75rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .overdue-item:hover {
            background: var(--border-color);
            transform: translateX(4px);
        }

        .modal-close {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(0, 61, 130, 0.2);
            margin-top: 1rem;
        }

        .modal-close:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 61, 130, 0.3);
        }

        @keyframes highlight {
            0% { box-shadow: 0 0 0 0 var(--accent); }
            50% { box-shadow: 0 0 30px 10px var(--accent); }
            100% { box-shadow: 0 4px 16px var(--shadow); }
        }

        .modal-content h2 {
            color: var(--danger);
            margin-bottom: 0.5rem;
            font-size: 1.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .start-from-section {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--gray-lighter);
            border-left: 4px solid var(--accent);
        }

        .start-from-section label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--accent);
        }

        .notes-section {
            margin-top: 1rem;
            border-top: 2px solid var(--border-color);
            padding-top: 1rem;
        }

        .notes-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 0.75rem;
            background: var(--gray-lighter);
            border: 2px solid var(--border-color);
            transition: all 0.2s;
        }

        .notes-toggle:hover {
            background: var(--border-color);
        }

        .notes-toggle span {
            font-weight: 600;
            color: var(--accent);
        }

        .notes-content {
            display: none;
            margin-top: 0.5rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .notes-content.show {
            display: block;
        }

        .notes-content textarea {
            width: 100%;
            min-height: 100px;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.95rem;
            resize: vertical;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .notes-content textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .save-note-btn {
            margin-top: 0.5rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .save-note-btn:hover {
            transform: translateY(-2px);
        }

        .edit-modal-content {
            border: 3px solid var(--accent);
        }

        .edit-modal-content h2 {
            color: var(--accent);
        }

        /* Flashcard Styles */
        .flashcard-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--gray-lighter) 100%);
            z-index: 2000;
            overflow-y: scroll;
        }

        .flashcard-page.active {
            display: block;
        }

        .flashcard-header {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 50%, var(--gray-primary) 100%);
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 20px var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gray-light);
        }

        .flashcard-header h1 {
            font-size: 1.6rem;
            color: white;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .close-flashcard-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            font-weight: 500;
        }

        .close-flashcard-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .flashcard-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .flashcard-form {
            background: var(--bg-primary);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 16px var(--shadow);
            border: 2px solid var(--accent);
            border-left: 6px solid var(--accent);
        }

        .flashcard-form h2 {
            color: var(--accent);
            margin-bottom: 1.5rem;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .flashcard-study-area {
            background: var(--bg-primary);
            padding: 2rem;
            box-shadow: 0 4px 16px var(--shadow);
            border: 2px solid var(--accent);
            text-align: center;
        }

        .flashcard-display {
            min-height: 300px;
            background: var(--bg-secondary);
            border: 3px solid var(--accent);
            padding: 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .flashcard-display:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 24px var(--shadow);
        }

        .flashcard-front {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .flashcard-back {
            font-size: 1.2rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: none;
        }

        .flashcard-explanation {
            font-size: 1rem;
            color: var(--text-secondary);
            font-style: italic;
            display: none;
        }

        .flashcard-back.show, .flashcard-explanation.show {
            display: block;
        }

        .flashcard-controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .reveal-btn {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .reveal-btn:hover {
            transform: translateY(-2px);
        }

        .flashcard-actions {
            display: none;
            gap: 1rem;
            justify-content: center;
        }

        .flashcard-actions.show {
            display: flex;
        }

        .correct-btn, .incorrect-btn {
            padding: 1rem 2rem;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 700;
            transition: all 0.3s;
            color: white;
        }

        .correct-btn {
            background: linear-gradient(135deg, var(--success) 0%, #43a047 100%);
        }

        .incorrect-btn {
            background: linear-gradient(135deg, var(--danger) 0%, #e53935 100%);
        }

        .correct-btn:hover, .incorrect-btn:hover {
            transform: translateY(-2px);
        }

        .flashcard-stats {
            display: flex;
            gap: 2rem;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .stat-correct {
            color: var(--success);
        }

        .stat-incorrect {
            color: var(--danger);
        }

        .flashcard-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .flashcard-item {
            background: var(--bg-primary);
            padding: 1rem;
            border: 2px solid var(--card-border);
            border-left: 4px solid var(--accent);
            position: relative;
        }

        .flashcard-item h4 {
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .flashcard-item-delete {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: var(--danger);
            color: white;
            border: none;
            padding: 0.25rem 0.5rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .subjects-grid {
                grid-template-columns: 1fr;
            }
            
            .flashcard-list {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                width: 95%;
                max-height: 90vh;
            }
        }
    </style>
</head>
<body>
    <!-- Header, Add Section, Search e Grid permanecem iguais -->
    <div class="header">
        <h1>📚 Revisão - Concurso Banco Central</h1>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button class="flashcard-btn" onclick="openFlashcards()">🃏 Flashcards</button>
            <button class="notification-btn" onclick="toggleNotifications()">
                🔔
                <span class="notification-badge" id="notificationBadge" style="display: none;"></span>
            </button>
        </div>
    </div>

    <div class="container">
        <div class="add-section">
            <h2>Adicionar Nova Matéria</h2>
            <div class="form-group">
                <label for="subjectName">Nome da Matéria:</label>
                <input type="text" id="subjectName" placeholder="Ex: Direito Administrativo">
            </div>
            <div class="form-group">
                <label for="subjectContent">Conteúdo da Matéria:</label>
                <input type="text" id="subjectContent" placeholder="Ex: Princípios da Administração Pública">
            </div>
            <div class="form-group">
                <label for="subjectNotes">Anotações (opcional):</label>
                <textarea id="subjectNotes" placeholder="Digite suas anotações aqui..."></textarea>
            </div>
            <div class="start-from-section">
                <label>Marque as revisões já realizadas:</label>
                <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal; cursor: pointer;">
                        <input type="checkbox" id="review1" value="0" style="cursor: pointer;" onchange="updateCheckboxes(0)">
                        <span>Revisão 1 dia</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal; cursor: pointer;">
                        <input type="checkbox" id="review7" value="1" style="cursor: pointer;" onchange="updateCheckboxes(1)">
                        <span>Revisão 7 dias</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal; cursor: pointer;">

        function showOverdueModal(overdueList) {
            const modal = document.getElementById('overdueModal');
            const list = document.getElementById('overdueList');
            
            list.innerHTML = overdueList.map(item => `
                <div class="overdue-item" onclick="scrollAndHighlightReview('${item.subjectId}', ${item.reviewIndex})">
                    <strong>${item.subject}</strong><br>
                    <span style="font-size: 0.9rem; color: var(--text-secondary);">${item.content}</span><br>
                    <span style="margin-top: 0.5rem; display: inline-block;">Revisão ${item.days} dias</span><br>

            modal.classList.add('active');
